<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="renderer" content="webkit">
    <title>Together Timer with Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Indie+Flower&family=Pacifico&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Indie Flower', cursive;
            margin: 0;
            background: url('https://picsum.photos/1600/900?random=1') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background-image 1s ease-in-out;
            position: relative;
        }
        h1, h2 {
            color: #FFF; /* White text color */
            text-align: center;
        }
        h1 {
            font-size: 2em;
            font-family: 'Great Vibes', cursive;
        }
        h2 {
            font-size: 2.5em;
            font-family: 'Dancing Script', cursive;
            margin-bottom: 0.5em;
        }
        .content, #author-info {
            text-align: center;
            padding: 0;
        }
        .timer {
            font-size: 3em;
            line-height: 1.5;
            font-family: 'Pacifico', cursive;
        }
        .timer b {
            color: #FFF; /* White color for the timer numbers */
        }
    </style>
</head>
<body>
    <audio id="bgm" loop controls autoplay>
        <source src="https://zxxie-air.github.io/music/My%20Sunshine-%E5%BC%A0%E6%9D%B0.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div class="content">
        <h1>My Music and Timer Page</h1>
        <h2 id="message">萌萌，我们已经在一起了</h2>
        <div class="timer">
            <b id="d"></b> 天 <b id="h"></b> 小时 <b id="m"></b> 分钟 <b id="s"></b> 秒
        </div>
    </div>

    <script>
        function timer() {
            var start = new Date(2024, 3, 20); // 修正月份为4月（3表示4月）
            var t = new Date() - start;
            var h = ~~(t / 1000 / 60 / 60 % 24);
            if (h < 10) { h = "0" + h; }
            var m = ~~(t / 1000 / 60 % 60);
            if (m < 10) { m = "0" + m; }
            var s = ~~(t / 1000 % 60);
            if (s < 10) { s = "0" + s; }
            document.getElementById('d').innerHTML = ~~(t / 1000 / 60 / 60 / 24);
            document.getElementById('h').innerHTML = h;
            document.getElementById('m').innerHTML = m;
            document.getElementById('s').innerHTML = s;

            // Check if today is June 1st
            var today = new Date();
            if (today.getMonth() == 4 && today.getDate() == 29) {
                document.getElementById('message').innerHTML = "萌萌，六一儿童节快乐！";
            }
        }
        timer();
        setInterval(timer, 1000);
    </script>
</body>
</html>
