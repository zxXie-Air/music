<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="renderer" content="webkit">
    <title>Together Timer</title> <!-- Fixed title -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Indie+Flower&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Indie Flower', cursive;
            margin: 0;
            background: url('https://source.unsplash.com/1600x900/?love') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background-image 1s ease-in-out;
        }

        h2 {
            font-size: 2.5em;
            font-family: 'Dancing Script', cursive;
            color: #FFF; /* White text color */
            margin-bottom: 0.5em;
        }

        .content {
            text-align: center;
            padding: 0;
        }

        .timer {
            font-size: 3em;
            line-height: 1.5;
            color: #FFF; /* White text color */
            font-family: 'Pacifico', cursive;
        }

        .timer b {
            color: #fd5f7e; /* Pink color for the timer numbers */
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .heart {
            position: absolute;
            top: -10px;
            width: 20px;
            height: 20px;
            background: url('https://i.imgur.com/MU2s3YD.png') no-repeat center center;
            background-size: cover;
            animation: float 6s ease-in-out infinite, heartbeat 1s ease infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>

<body>
    <div class="content">
        <h2>某某，我们已经在一起了</h2>
        <div class="timer">
            <b id="d"></b> 天 <b id="h"></b> 小时 <b id="m"></b> 分钟 <b id="s"></b> 秒
        </div>
    </div>

    <script>
        function timer() {
            var start = new Date(2024, 3, 20); // 设置起始时间为2024年4月20日
            var t = new Date() - start;
            var h = ~~(t / 1000 / 60 / 60 % 24);
            if (h < 10) {
                h = "0" + h;
            }
            var m = ~~(t / 1000 / 60 % 60);
            if (m < 10) {
                m = "0" + m;
            }

            var s = ~~(t / 1000 % 60);
            if (s < 10) {
                s = "0" + s;
            }
            document.getElementById('d').innerHTML = ~~(t / 1000 / 60 / 60 / 24);
            document.getElementById('h').innerHTML = h;
            document.getElementById('m').innerHTML = m;
            document.getElementById('s').innerHTML = s;
        }
        timer();
        setInterval(timer, 1000);

        function changeBackgroundImage() {
            const backgrounds = [
                "https://source.unsplash.com/1600x900/?love",
                "https://source.unsplash.com/1600x900/?romantic",
                "https://source.unsplash.com/1600x900/?couple",
                "https://source.unsplash.com/1600x900/?heart"
            ];
            let currentBackground = 0;
            setInterval(() => {
                currentBackground = (currentBackground + 1) % backgrounds.length;
                document.body.style.backgroundImage = 'url(' + backgrounds[currentBackground] + ')';
            }, 5000); // 更换背景图片的时间间隔为5000毫秒（5秒）
        }
        changeBackgroundImage();
    </script>

    <audio autoplay loop>
        <source src="https://cdn.pixabay.com/download/audio/2021/08/02/audio_88dbf6f71d.mp3?filename=romantic-music-6643.mp3" type="audio/mpeg">
    </audio>

    <div class="heart" style="left: 20%; animation-delay: 0s;"></div>
    <div class="heart" style="left: 40%; animation-delay: 2s;"></div>
    <div class="heart" style="left: 60%; animation-delay: 4s;"></div>
    <div class="heart" style="left: 80%; animation-delay: 6s;"></div>
</body>

</html>
